<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Temperature Converter</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    overflow: hidden;
}

/* Floating bubbles animation */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: url('https://www.transparenttextures.com/patterns/cubes.png');
    opacity: 0.1;
    animation: moveBg 20s linear infinite;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    100% { transform: translate(-200px, -200px); }
}

/* Card */
.container {
    position: relative;
    width: 350px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(0,255,255,0.2);
    text-align: center;
    color: white;
}

/* Neon title */
h1 {
    margin-bottom: 20px;
    font-size: 26px;
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 15px;
    font-size: 16px;
}

/* Toggle buttons */
.toggle {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.toggle button {
    flex: 1;
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.toggle button.active {
    background: linear-gradient(45deg, #00f7ff, #00ff88);
    color: black;
    font-weight: bold;
}

/* Convert button */
.convert-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #ff0080, #ff8c00);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.convert-btn:hover {
    transform: scale(1.07);
    box-shadow: 0 0 20px #ff0080;
}

/* Result */
.result {
    margin-top: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* Dynamic temperature colors */
.hot { color: #ff4d4d; text-shadow: 0 0 10px #ff4d4d; }
.cold { color: #00c6ff; text-shadow: 0 0 10px #00c6ff; }
.normal { color: #00ff88; text-shadow: 0 0 10px #00ff88; }

</style>
</head>

<body>

<div class="container">
    <h1>⚡ Smart Converter</h1>

    <input type="number" id="temp" placeholder="Enter temperature">

    <div class="toggle">
        <button class="active" onclick="setMode('C')" id="cBtn">C → F</button>
        <button onclick="setMode('F')" id="fBtn">F → C</button>
        <button onclick="setMode('K')" id="kBtn">C → K</button>
    </div>

    <button class="convert-btn" onclick="convert()">Convert</button>

    <div class="result" id="output">--</div>
</div>

<script>
let mode = "C";

function setMode(m) {
    mode = m;
    document.querySelectorAll(".toggle button").forEach(btn => btn.classList.remove("active"));
    document.getElementById(m.toLowerCase() + "Btn").classList.add("active");
}

function convert() {
    let t = parseFloat(document.getElementById("temp").value);
    let output = document.getElementById("output");

    if (isNaN(t)) {
        output.innerHTML = "⚠ Enter valid number";
        return;
    }

    let result;

    if (mode === "C") result = (t * 9/5 + 32).toFixed(2) + " °F";
    if (mode === "F") result = ((t - 32) * 5/9).toFixed(2) + " °C";
    if (mode === "K") result = (t + 273.15).toFixed(2) + " K";

    output.innerHTML = result;

    // Color effect
    output.classList.remove("hot", "cold", "normal");
    if (t > 30) output.classList.add("hot");
    else if (t < 10) output.classList.add("cold");
    else output.classList.add("normal");
}
</script>

</body>
</html>
